# 待辦48 config-as-code:controller=CT260(裁決:不建 VLAN90 host)
# venv:~/.venvs/ansible(pip ansible 12 / core 2.21;paramiko 為 pct_remote 所需)
# 用法:cd ~/workspace/ansible && ~/.venvs/ansible/bin/ansible-playbook playbooks/config-backup.yml
[defaults]
inventory = inventory/hosts.yml
gathering = explicit
retry_files_enabled = False
interpreter_python = auto_silent
# ssh 類節點(pve24/routerpve/openwrt)完全沿用 ~/.ssh/config(alias 即 inventory 名);
# pct 類節點走 paramiko,連線參數在 inventory 明寫。

[ssh_connection]
pipelining = True
