# 待辦48 Phase 1:全站設定唯讀入庫(只 fetch/讀,不寫任何目標)
# 跑法:cd ~/workspace/ansible && ~/.venvs/ansible/bin/ansible-playbook playbooks/config-backup.yml
# 跑完必跑 ./scan-secrets.sh 通過才准 commit(明文秘鑰不入庫;雜湊可入 private repo)
---
- name: OpenWrt 設定備份
  hosts: openwrt
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
  tasks:
    - name: 列自製腳本與 nft 附加檔
      ansible.builtin.raw: find /usr/bin -maxdepth 1 -name 'homelab-*' 2>/dev/null; find /etc/nftables.d -type f 2>/dev/null; true
      register: owrt_extra
      changed_when: false
    - name: fetch 設定
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ backup_root }}"
        fail_on_missing: false
      loop: "{{ base_files + (owrt_extra.stdout_lines | default([]) | map('trim') | select() | list) }}"
      vars:
        base_files:
          - /etc/config/network
          - /etc/config/firewall
          - /etc/config/dhcp
          - /etc/config/system
          - /etc/config/dropbear
          - /etc/config/adguardhome
          - /etc/adguardhome/adguardhome.yaml
          - /etc/crontabs/root

- name: RouterPVE 設定備份(root 直讀)
  hosts: routerpve
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
  tasks:
    - name: fetch 設定
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ backup_root }}"
        fail_on_missing: false
      loop:
        - /etc/pve/storage.cfg
        - /etc/pve/qemu-server/101.conf
        - /etc/pve/qemu-server/300.conf
        - /etc/network/interfaces
        - /etc/vzdump.conf

- name: pve24 設定備份(codex-admin,sudo 僅 pct/qm/pvesh/pvesm → 用 pvesh/pct 輸出代替讀檔)
  hosts: pve24
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
    ct_ids: [100, 102, 201, 202, 203, 204, 205, 250, 260, 270]  # 204/205 補入 2026-07-10(B3 盤點發現漏)
  tasks:
    - name: pvesh storage 定義
      ansible.builtin.command: sudo pvesh get storage --output-format json-pretty
      register: pvesh_storage
      changed_when: false
    - name: 建本地備份目錄
      ansible.builtin.file:
        path: "{{ backup_root }}/pve24"
        state: directory
        mode: "0755"
      delegate_to: localhost
    - name: 正規化 storage 定義(pvesh 的陣列序與 content 逗號清單序皆隨機,雙重排序消除假 diff)
      ansible.builtin.set_fact:
        storage_norm: "{{ (storage_norm | default([])) + [ item | combine({'content': item.content | default('') | split(',') | sort | join(',')}) ] }}"
      loop: "{{ pvesh_storage.stdout | from_json | sort(attribute='storage') }}"
      loop_control:
        label: "{{ item.storage }}"
    - name: 存 storage 定義
      ansible.builtin.copy:
        content: "{{ storage_norm | to_nice_json }}\n"
        dest: "{{ backup_root }}/pve24/pvesh-storage.json"
        mode: "0644"
      delegate_to: localhost
    - name: pct config 各 CT
      ansible.builtin.command: "sudo pct config {{ item }}"
      loop: "{{ ct_ids }}"
      register: pct_cfg
      changed_when: false
    - name: 存 pct config
      ansible.builtin.copy:
        content: "{{ item.stdout }}\n"
        dest: "{{ backup_root }}/pve24/pct-config-{{ item.item }}.conf"
        mode: "0644"
      loop: "{{ pct_cfg.results }}"
      loop_control:
        label: "{{ item.item }}"
      delegate_to: localhost
    - name: fetch 世界可讀設定檔
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ backup_root }}"
        fail_on_missing: false
      loop:
        - /etc/network/interfaces
        - /etc/vzdump.conf

- name: CT 服務設定備份(pct_remote,root)
  hosts: ct:!ct250
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
  tasks:
    - name: 列本機備份清單
      ansible.builtin.shell: "{{ backup_find_cmd | default('true') }}"
      register: found
      changed_when: false
    - name: 讀取檔案內容(slurp,pct_remote 無 sftp)
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop: "{{ (found.stdout_lines | default([]) | map('trim') | select() | list) + (backup_files | default([])) }}"
      register: slurped
      ignore_errors: true
    - name: 建本地備份目錄
      ansible.builtin.file:
        path: "{{ (backup_root ~ '/' ~ inventory_hostname ~ item.item) | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ slurped.results | selectattr('content', 'defined') | list }}"
      loop_control:
        label: "{{ item.item }}"
      delegate_to: localhost
    - name: 存到 repo
      ansible.builtin.copy:
        content: "{{ item.content | b64decode }}"
        dest: "{{ backup_root }}/{{ inventory_hostname }}{{ item.item }}"
        mode: "0644"
      loop: "{{ slurped.results | selectattr('content', 'defined') | list }}"
      loop_control:
        label: "{{ item.item }}"
      delegate_to: localhost

- name: 入庫前 redact 已知明文秘鑰欄位(政策:雜湊可入、明文不入)
  hosts: localhost
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
  tasks:
    - name: redact server.properties 秘鑰欄位
      ansible.builtin.shell: |
        find {{ backup_root }} -name 'server.properties' -exec \
          sed -i -E 's/^(management-server-secret|rcon\.password)=..*/\1=**REDACTED**/' {} +
      changed_when: true

    - name: redact OpenWrt uci wireguard 金鑰欄位(待辦24;實鑰只存路由器)
      ansible.builtin.shell: |
        sed -i -E "s/^(\s*option (private_key|preshared_key)) '.*'/\1 '**REDACTED**'/" \
          {{ backup_root }}/openwrt/etc/config/network 2>/dev/null || true
      changed_when: true

- name: 監聽埠基線收集(B4 漂移偵測,2026-07-10)
  # 正規化=「proto local:port proc」排序去重,PID 剝除;UDP 高位埠(>=32768)屬
  # client/暫態 socket,濾掉防日更假 diff(例外:44873=WG break-glass 常駐監聽)。
  # pve24 無 root(sudo 白名單無 ss):埠全列但 proc 名多為 '-',逐日穩定即可。
  # 漂移偵測在 hl-ansible-backup:入庫前 git diff listen-ports.txt,有差→TG 一次性
  # 告警;23:30 hl-git-autocommit 入庫=新基線自動接受。VM300 蜜罐維持不入(污染區)。
  # tailscaled 綁 tailnet 位址(100.64/10、fd7a:)的 peerapi TCP 埠每次重啟隨機換,
  # 一律濾除(2026-07-10 事故重啟誤報一次);它若改綁其他位址仍會被抓。
  hosts: all:!manual:!wazuhct
  gather_facts: false
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
    listen_cmd_ss: |
      ss -tulnpH 2>/dev/null | awk '{
        proc="-";
        if (match($0, /users:\(\("[^"]+"/)) proc=substr($0, RSTART+9, RLENGTH-10);
        n=split($5, a, ":"); port=a[n];
        if ($1 ~ /^udp/ && port+0 >= 32768 && port+0 != 44873) next;
        if (proc == "tailscaled" && ($5 ~ /^100\./ || $5 ~ /^\[fd7a:/)) next;
        print $1, $5, proc
      }' | sort -u
    listen_cmd_netstat: |
      netstat -tulnp 2>/dev/null | awk '/^(tcp|udp)/{
        prog=$NF; sub(/^[0-9]+\//, "", prog);
        n=split($4, a, ":"); port=a[n];
        if ($1 ~ /^udp/ && port+0 >= 32768 && port+0 != 44873) next;
        print $1, $4, prog
      }' | sort -u
  tasks:
    - name: 收集監聽埠(openwrt=busybox netstat,其餘=iproute2 ss)
      ansible.builtin.raw: "{{ listen_cmd_netstat if inventory_hostname == 'openwrt' else listen_cmd_ss }}"
      register: ports
      changed_when: false
    - name: 建目錄
      ansible.builtin.file:
        path: "{{ backup_root }}/{{ inventory_hostname }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
    - name: 存基線
      ansible.builtin.copy:
        content: "{{ (ports.stdout_lines | map('trim') | select() | join('\n')) ~ '\n' }}"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/listen-ports.txt"
        mode: "0644"
      delegate_to: localhost
