# 待辦48 inventory。設計決策:
#  - vm300 刻意不入(污染區,只有 qm guest exec,維持隔離)
#  - dxp4800 / ct250 入 manual 群(SSH 3h 關窗 / 常態關機),日常 run 用 all:!manual
#  - CT 一律走 community.proxmox.proxmox_pct_remote(ssh pve24 + sudo pct exec),
#    不在 CT 內開 SSH——沿用「CT root 走 pct」既有安全決策
all:
  children:
    controller:
      hosts:
        ct260:
          ansible_connection: local

    infra:   # 直連 SSH,參數以 ~/.ssh/config 為準(勿在此重複 IP/port)
      hosts:
        pve24:
          ansible_host: pve24-auto
        routerpve:
          ansible_host: routerpve-auto
        openwrt:
          ansible_host: openwrt-auto
          # dropbear 無 sftp、scp 亦不通,piped 實測可用(2026-07-05)
          ansible_ssh_transfer_method: piped

    ct:      # 皆在 pve24 上;paramiko 不讀 ssh config,參數明寫於 group_vars
      hosts:
        ct100: { proxmox_vmid: 100 }   # MC-server
        ct102: { proxmox_vmid: 102 }   # mc-proxy
        ct201: { proxmox_vmid: 201 }   # monitor
        ct202: { proxmox_vmid: 202 }   # fwdproxy
        ct203: { proxmox_vmid: 203 }   # ct-dmz-proxy
        ct204: { proxmox_vmid: 204 }   # wazuh HIDS(待辦14,2026-07-05 建)
        ct205: { proxmox_vmid: 205 }   # guest-portal(待辦50;B4 補入 2026-07-10,
                                       # 無 host_vars=config-backup 只收埠基線)
        ct250: { proxmox_vmid: 250 }   # restore lab(常態關機)
        ct270: { proxmox_vmid: 270 }   # life-ops

    wazuhct:  # 待辦14b:CT260 本機 codex 無 sudo,裝 agent 走 pct 路徑的別名
              # (刻意不入 ct 群,避免進 config-backup 掃描範圍造成自我備份)
      hosts:
        ct260pct:
          proxmox_vmid: 260
          ansible_connection: community.proxmox.proxmox_pct_remote
          ansible_host: 192.168.20.5
          ansible_user: codex-admin
          ansible_port: 22
          ansible_private_key_file: ~/.ssh/ct260_auto_ed25519
          ansible_paramiko_host_key_auto_add: true

    manual:  # 非日常對象:ping/backup 用 --limit 'all:!manual'
      hosts:
        ct250:
        dxp4800:
          ansible_host: 192.168.30.3
          ansible_user: My-Big-Nas
          ansible_port: 45123
          ansible_private_key_file: ~/.ssh/ct260_ops_ed25519
