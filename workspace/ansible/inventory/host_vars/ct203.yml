# ct-dmz-proxy:Caddy + authelia compose(排除 .before-* 歷史檔)
# 排除 authelia configuration.yml / users 檔(jwt/session secrets、密碼雜湊集中檔)
backup_find_cmd: "find /opt/authelia -maxdepth 2 -name 'docker-compose.yml' 2>/dev/null; find /etc/caddy -maxdepth 2 -type f -size -256k ! -name '*.before*' ! -name '*before-*' 2>/dev/null"
