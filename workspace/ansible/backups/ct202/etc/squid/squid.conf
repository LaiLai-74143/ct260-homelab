# fwdproxy squid — VLAN80 egress allowlist for CT270 HA/dockerd. 2026-07-01.
http_port 3128
visible_hostname fwdproxy

# --- 允許使用代理的客戶端 ---
acl clients src 192.168.20.70/32     # CT270 (HA + dockerd)
acl clients src 10.80.80.10/32       # 本機自測
acl clients src 127.0.0.1/32

# --- 端口/方法安全 ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny !clients

# --- 出站目的地白名單（HTTPS 走 CONNECT，dstdomain 比對目標 host）---
acl ok dstdomain .github.com .githubusercontent.com codeload.github.com
acl ok dstdomain ghcr.io pkg-containers.githubusercontent.com
acl ok dstdomain pypi.org files.pythonhosted.org
acl ok dstdomain deb.debian.org   # paperless-ngx 容器啟動裝 tesseract-ocr-chi-tra(每次 recreate 重裝),2026-07-05 待辦15
acl ok dstdomain .home-assistant.io api.met.no
acl ok dstdomain .ithome.com.tw technews.tw hnrss.org .servethehome.com selfh.st feeds.arstechnica.com   # FreshRSS RSS 訂閱源(待辦30,2026-07-09 使用者點名)
# acl ok dstdomain .docker.io production.cloudfront.docker.com   # dockerhub 暫時窗(2026-07-05 待辦15 拉 redis 後復關;CDN 已由 cloudflare 改 cloudfront)

http_access allow clients ok
http_access deny all

# --- 不快取（純轉發，減少殘留）---
cache deny all
access_log daemon:/var/log/squid/access.log squid
