groups:
  - name: firewall-security
    rules:
      # absolute, not relative: bans naturally decay + daily reset, so only 0 is anomalous
      - alert: PortscanBanListEmpty
        expr: portscan_autoban_banned_ips == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "portscan-autoban ban list empty"
          description: "portscan_autoban_banned_ips == 0 for 5m (state file lost / nft set flushed / service reset)."

      - alert: PortscanBanSpike
        expr: delta(portscan_autoban_banned_ips[10m]) > 80
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "portscan ban spike"
          description: "Net +{{ $value | printf \"%.0f\" }} banned IPs in 10m (scan burst / rule anomaly)."

      - alert: CowrieQuarantineSpike
        expr: delta(cowrie_quarantine_quarantined_ips[10m]) > 30
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "cowrie quarantine spike"
          description: "Net +{{ $value | printf \"%.0f\" }} quarantined IPs in 10m (honeypot login burst)."

      # todo 16: internal tcp/22 toward any VLAN gateway IP is a dead port (real SSH elsewhere);
      # aggregate counter (not per-src series) so the very first hit still trips increase()
      - alert: SSH22TripwireHit
        expr: increase(openwrt_ssh22_tripwire_packets_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          ai_analyze: "true"
        annotations:
          summary: "internal SSH22 tripwire hit"
          description: "{{ $value | printf \"%.0f\" }} packet(s) hit dead port 22 on a gateway IP in 5m (misconfig or lateral scan from a compromised node). Source: openwrt_ssh22_tripwire_total{src=...} / Loki SSH22-TRIPWIRE lines. No whitelist by design; amtool silence before authorized scans."

      # tripwire integrity: chain gone (boot race / manual stop) = silent disarm, nobody notices
      - alert: SSH22TripwireInactive
        expr: openwrt_ssh22_tripwire_active != 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ssh22 tripwire disarmed"
          description: "openwrt_ssh22_tripwire_active != 1 for 10m (nft drop rule missing: init failed at boot or table deleted; tripwire silently off). /etc/init.d/ssh22-tripwire start to re-arm."
