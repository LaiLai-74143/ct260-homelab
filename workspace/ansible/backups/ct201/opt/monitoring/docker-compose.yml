services:
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--enable-feature=promql-experimental-functions"
      - "--web.external-url=https://prometheus.hl.lailai74143.com"

  grafana:
    image: grafana/grafana-oss:13.0.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=https://grafana.hl.lailai74143.com
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_HIDE_VERSION=true
      - GF_SNAPSHOTS_ENABLED=false
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false

  gotify:
    image: gotify/server:2.9.1
    container_name: gotify
    restart: unless-stopped
    ports:
      - "8090:80"
    env_file:
      - ./gotify.env
    volumes:
      - gotify_data:/app/data

  alertmanager:
    image: prom/alertmanager:v0.33.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  alertmanager-gotify-bridge:
    image: ghcr.io/druggeri/alertmanager_gotify_bridge:2.3.2
    container_name: alertmanager-gotify-bridge
    restart: unless-stopped
    env_file:
      - ./alertmanager-gotify-bridge.env
    environment:
      - EXTENDED_DETAILS=true
    depends_on:
      - gotify

  pve-exporter:
    image: prompve/prometheus-pve-exporter:3.9.0
    container_name: pve-exporter
    restart: unless-stopped
    volumes:
      - ./pve.yml:/etc/prometheus/pve.yml:ro
    # 無 host port:僅 prometheus 經 compose 內網 scrape(pve-exporter:9221),比照 bridge 模式

  snmp-exporter:
    image: prom/snmp-exporter:v0.30.1
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./snmp-auth.yml:/etc/snmp_exporter/snmp-auth.yml:ro
    command:
      - "--config.file=/etc/snmp_exporter/snmp.yml"
      - "--config.file=/etc/snmp_exporter/snmp-auth.yml"
    # 無 host port:僅 prometheus 經 compose 內網 scrape(snmp-exporter:9116),比照 pve-exporter

  portal:
    image: portal:0.8.2
    container_name: portal
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - PORTAL_MODE=live
      - PROM_URL=http://prometheus:9090
      - AM_URL=http://alertmanager:9093
      - LOKI_URL=http://loki:3100
      - KUMA_URL=http://host.docker.internal:3001
    env_file:
      - /opt/portal/portal.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/portal/static:/app/static:ro
      - /opt/portal/data:/app/data:ro
    # 入口大廳(待辦49 M1):BFF 唯讀聚合 + SPA;PC40 直達 :8088;image 本地 build pin

  loki:
    image: grafana/loki:3.7.3
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/config.yml"

  promtail:
    image: grafana/promtail:3.6.11
    container_name: promtail
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/positions
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki

  ntfy:
    image: binwiederhier/ntfy:v2.25.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "8091:80"
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy_cache:/var/cache/ntfy
      - ntfy_auth:/var/lib/ntfy

  diun:
    image: crazymax/diun:4.30.0
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - ./diun-data:/data
      - ./diun.yml:/diun.yml:ro
      - ./diun-images.yml:/etc/diun/images.yml:ro
      - ./secrets/diun-ntfy-token:/run/secrets/ntfy-token:ro
    environment:
      - TZ=Asia/Taipei
      - LOG_LEVEL=info
    # 版本更新監看(待辦21):file provider 全站 pin 清單→本機 ntfy topic homelab-updates
    # (TG egress 維持集中 CT260,diun 無對外通知通道);設定檔改動後 docker restart diun

volumes:
  prometheus_data:
  grafana_data:
  gotify_data:
  alertmanager_data:
  loki_data:
  promtail_positions:
  ntfy_cache:
  ntfy_auth:
