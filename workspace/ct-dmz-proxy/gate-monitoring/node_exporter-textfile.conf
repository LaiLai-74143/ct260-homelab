# drop-in: /etc/systemd/system/node_exporter.service.d/textfile.conf
# 開啟 node_exporter textfile collector 目錄（原 ExecStart 僅 --web.listen-address=:9100）。
# 回滾：rm 此檔 + systemctl daemon-reload + systemctl restart node_exporter。
[Service]
ExecStart=
ExecStart=/usr/local/bin/node_exporter --web.listen-address=:9100 --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
