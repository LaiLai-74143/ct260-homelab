# rules/power.yml вҖ” UPS е‘ҠиӯҰ(еҫ…иҫҰ49 йӣ»еҠӣжЁЎеЎҠ,2026-07-08)
# ж•ёж“ҡжәҗ:pve24 /usr/local/bin/ups-metrics.sh(upscвҶ’textfile,йЁҺ pve-node:9100)
groups:
  - name: power-ups
    rules:
      - alert: UPSOnBattery
        expr: nut_ups_on_battery == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "UPS on battery (mains lost)"
          description: "CyberPower CP1500 иҪүйӣ»жұ дҫӣйӣ»е·І 1mвҖ”вҖ”еёӮйӣ»дёӯж–·;NUT 180s еҫҢй–Ӣе§Ӣе„Әйӣ…й—ңж©ҹеәҸгҖӮ"

      - alert: UPSLowBattery
        expr: nut_battery_low == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "UPS low battery"
          description: "UPS еӣһе ұ LB(дҪҺйӣ»йҮҸ)вҖ”вҖ”й—ңж©ҹеәҸжҮүе·Іи§ёзҷј,з«ӢеҚізўәиӘҚгҖӮ"

      - alert: UPSDataStale
        expr: time() - node_textfile_mtime_seconds{file=~".*ups[.]prom"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "UPS metrics stale on {{ $labels.instance }}"
          description: "ups.prom и¶…йҒҺ 5 еҲҶйҗҳжңӘжӣҙж–°вҖ”вҖ”pve24 cron/upsc з®Ўз·ҡдёӯж–·(йӣ»еҠӣй Ғе·ІеҲҮ pending иӘ еҜҰж…Ӣ)гҖӮ"
