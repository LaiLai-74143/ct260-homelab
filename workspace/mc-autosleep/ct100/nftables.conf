#!/usr/sbin/nft -f

flush ruleset

# CT100 Minecraft backend guard.
#
# Annotation policy:
# - Use nftables native define.
# - Do not depend on DNS or external constants.
# - [CONST: ...] comments are for human/audit/grep only.

# [CONST: MC_PROXY_IP] CT102 Velocity / Geyser proxy IP
define MC_PROXY_IP = 10.70.70.10

# [CONST: MC_BACKEND_IP] CT100 Fabric backend VLAN70 IP
define MC_BACKEND_IP = 10.70.70.20

# [CONST: MC_JAVA_PORT] Minecraft Java / Velocity / backend port
define MC_JAVA_PORT = 25565

# [CONST: MONITOR_IP] CT201 monitoring / game observation IP
define MONITOR_IP = 10.70.70.11

# [CONST: PC40_IP] PC40 user workstation (trusted VLAN40, routed via OpenWrt; 待辦49 2026-07-08)
define PC40_IP = 192.168.40.4

# [CONST: TS_GATE_IP] CT203 subnet-router masq source (tailnet 發證後手機; 待辦49 2026-07-08)
define TS_GATE_IP = 10.60.60.10

# [CONST: MCS_WEB_PORT] MCSManager web UI port
define MCS_WEB_PORT = 23333

# [CONST: MCS_DAEMON_PORT] MCSManager daemon websocket port (即時終端;待辦49 2026-07-08)
define MCS_DAEMON_PORT = 24444

# [CONST: NODE_EXPORTER_PORT] node_exporter metrics port
define NODE_EXPORTER_PORT = 9100

# [CONST: MC_GATE_PORT] mc-gate hook port (LimboAutoServer wake/sleep; mc-autosleep 2026-07-10)
define MC_GATE_PORT = 25580

table inet mc_backend_guard {
    chain input {
        type filter hook input priority -100; policy accept;

        ct state established,related accept

        # Allow Velocity proxy to ping backend over VLAN70.
        iifname "eth2" ip saddr $MC_PROXY_IP ip daddr $MC_BACKEND_IP icmp type echo-request accept

        # Allow Velocity proxy to connect to Minecraft backend over VLAN70.
        iifname "eth2" ip saddr $MC_PROXY_IP ip daddr $MC_BACKEND_IP tcp dport $MC_JAVA_PORT accept

        # Allow CT201 Uptime Kuma to check MCSManager web UI over VLAN70.
        iifname "eth2" ip saddr $MONITOR_IP ip daddr $MC_BACKEND_IP tcp dport $MCS_WEB_PORT accept

        # Allow CT201 Prometheus to scrape node_exporter over VLAN70.
        iifname "eth2" ip saddr $MONITOR_IP ip daddr $MC_BACKEND_IP tcp dport $NODE_EXPORTER_PORT accept

        # Allow CT201 Uptime Kuma to ping Minecraft backend over VLAN70.
        iifname "eth2" ip saddr $MONITOR_IP ip daddr $MC_BACKEND_IP icmp type echo-request accept

        # Allow PC40 to reach MCSManager web UI (via OpenWrt inter-VLAN; 待辦49 2026-07-08).
        iifname "eth2" ip saddr $PC40_IP ip daddr $MC_BACKEND_IP tcp dport $MCS_WEB_PORT accept

        # Allow authed tailnet phone (masq as CT203) to reach MCSManager web UI (待辦49 2026-07-08).
        iifname "eth2" ip saddr $TS_GATE_IP ip daddr $MC_BACKEND_IP tcp dport $MCS_WEB_PORT accept

        # Allow PC40 to reach MCSManager daemon websocket (web console terminal; 待辦49 2026-07-08).
        iifname "eth2" ip saddr $PC40_IP ip daddr $MC_BACKEND_IP tcp dport $MCS_DAEMON_PORT accept

        # Allow authed tailnet phone (masq as CT203) to reach MCSManager daemon websocket (待辦49 2026-07-08).
        iifname "eth2" ip saddr $TS_GATE_IP ip daddr $MC_BACKEND_IP tcp dport $MCS_DAEMON_PORT accept

        # Allow local MCSM daemon (mcping) to reach backend Java port via loopback (待辦49 2026-07-08).
        iifname "lo" ip daddr $MC_BACKEND_IP tcp dport $MC_JAVA_PORT accept

        # Allow Velocity proxy (LimboAutoServer start/stop) to reach mc-gate hook (mc-autosleep 2026-07-10).
        iifname "eth2" ip saddr $MC_PROXY_IP ip daddr $MC_BACKEND_IP tcp dport $MC_GATE_PORT accept

        # Drop all other access to backend Java port.
        tcp dport $MC_JAVA_PORT drop

        # Drop all other packets targeting backend VLAN70 IP.
        iifname "eth2" ip daddr $MC_BACKEND_IP drop
    }
}
